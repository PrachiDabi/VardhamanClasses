
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vardhaman Classes</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="vc-page">

  <header class="vc-header">
    <nav class="vc-nav vc-pad-x">
      <a href="#home" class="vc-logo-link">
        <span class="vc-logo-icon" data-text="Navigation.BrandInitial"></span>
        <span class="vc-logo-text" data-text="Navigation.BrandName"></span>
      </a>
      <div class="vc-nav-actions">
        <span class="vc-navlinks" id="NavLinks"></span>
        <a href="#contact" class="vc-link vc-btn-nav" data-text="Navigation.EnrollLabel"></a>
      </div>
    </nav>
  </header>

  <section id="home" class="vc-section-anchor vc-hero">
    <div class="vc-blob vc-blob--hero-teal"></div>
    <div class="vc-blob vc-blob--hero-red"></div>
    <div class="vc-blob vc-blob--hero-ring"></div>
    <div class="vc-container vc-hero-grid vc-grid2 vc-pad-x">
      <div>
        <span class="vc-eyebrow vc-eyebrow--hero">
          <svg class="vc-icon-twinkle" width="15" height="15" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
          <span data-text="Hero.Tagline"></span>
        </span>
        <h1 class="vc-heading-xl">
          <span data-text="Hero.Heading"></span><span class="vc-text-accent" data-text="Hero.HeadingAccent"></span>
        </h1>
        <p class="vc-lead" data-text="Hero.Lead"></p>
        <div class="vc-actions">
          <a href="#contact" class="vc-link vc-btn-primary" data-text="Hero.PrimaryButton"></a>
          <a href="#contact" class="vc-link vc-btn-secondary" data-text="Hero.SecondaryButton"></a>
        </div>
        <div class="vc-tag-list" id="SubjectTags"></div>
      </div>
      <div class="vc-hero-media">
        <div class="vc-photo-frame">
          <img class="vc-photo-frame-img" src="assets/Images/4.jpeg" alt="" data-alt="Hero.PhotoCaption">
        </div>
        <div class="vc-float-card vc-float-card--doubt">
          <div class="vc-float-card-row">
            <span class="vc-icon-circle">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0E6A78" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
            </span>
            <div class="vc-float-card-title" data-text="Hero.FloatingCardTitle"></div>
          </div>
          <div class="vc-float-card-body" data-text="Hero.FloatingCardBody"></div>
        </div>
        <div class="vc-board-badge">
          <div class="vc-board-badge-title" data-text="Hero.BoardsBadgeTitle"></div>
          <div class="vc-board-badge-sub" data-text="Hero.BoardsBadgeSubtitle"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="vc-marquee-bar">
    <div class="vc-marquee-wrap">
      <div class="vc-marquee" id="TrustMarquee"></div>
    </div>
  </div>

  <section id="about" class="vc-section-anchor vc-about vc-grid2 vc-sec vc-pad-x">
    <div class="vc-about-media">
      <div class="vc-blob vc-blob--about-ring"></div>
      <div class="vc-blob vc-blob--about-teal"></div>
      <div class="vc-rise2 vc-photo-frame vc-photo-frame--about">
        <img class="vc-photo-frame-img" src="assets/Images/3.jpeg" alt="" data-alt="About.PhotoCaption">
      </div>
    </div>
    <div>
      <span class="vc-rise2 vc-eyebrow">
        <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
        <span data-text="About.Eyebrow"></span>
      </span>
      <h2 class="vc-rise2 vc-d1 vc-heading-lg" data-text="About.Heading"></h2>
      <div id="AboutParagraphs"></div>
      <div class="vc-rise2 vc-d3 vc-stats" id="AboutStats"></div>
    </div>
  </section>

  <section id="teachers" class="vc-section-anchor vc-section-muted vc-sec">
    <div class="vc-blob vc-blob--teachers"></div>
    <div class="vc-blob vc-blob--teachers-ring"></div>
    <div class="vc-section-inner vc-pad-x">
      <div class="vc-section-header">
        <span class="vc-rise2 vc-eyebrow vc-eyebrow--teachers">
          <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
          <span data-text="Teachers.Eyebrow"></span>
        </span>
        <h2 class="vc-rise2 vc-d1 vc-heading-lg" data-text="Teachers.Heading"></h2>
      </div>
      <div class="vc-teacher-grid vc-grid2 vc-stagger" id="TeacherGrid"></div>
    </div>
  </section>

  <section class="vc-section-anchor vc-section vc-pad-x">
    <div class="vc-blob vc-blob--reasons"></div>
    <div class="vc-section-header">
      <span class="vc-rise2 vc-eyebrow">
        <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
        <span data-text="Reasons.Eyebrow"></span>
      </span>
      <h2 class="vc-rise2 vc-d1 vc-heading-lg" data-text="Reasons.Heading"></h2>
    </div>
    <div class="vc-grid3 vc-stagger" id="ReasonGrid"></div>
  </section>

  <section id="courses" class="vc-section-anchor vc-section-muted vc-sec">
    <div class="vc-blob vc-blob--courses"></div>
    <div class="vc-blob vc-blob--courses-ring"></div>
    <div class="vc-section-inner vc-pad-x">
      <div class="vc-section-header">
        <span class="vc-rise2 vc-eyebrow vc-eyebrow--courses">
          <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
          <span data-text="Courses.Eyebrow"></span>
        </span>
        <h2 class="vc-rise2 vc-d1 vc-heading-lg" data-text="Courses.Heading"></h2>
      </div>
      <div class="vc-grid3 vc-stagger" id="BatchGrid"></div>
    </div>
  </section>

  <section id="reviews" class="vc-section-anchor vc-section vc-pad-x">
    <div class="vc-blob vc-blob--reviews-ring"></div>
    <div class="vc-section-header">
      <span class="vc-rise2 vc-eyebrow">
        <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#8E1B2A"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
        <span data-text="Reviews.Eyebrow"></span>
      </span>
      <h2 class="vc-rise2 vc-d1 vc-heading-lg" data-text="Reviews.Heading"></h2>
    </div>
    <div class="vc-grid3 vc-stagger" id="ReviewGrid"></div>
  </section>

  <section id="contact" class="vc-section-anchor vc-contact vc-sec">
    <div class="vc-blob vc-blob--contact-teal"></div>
    <div class="vc-blob vc-blob--contact-ring"></div>
    <div class="vc-container vc-contact-grid vc-grid2 vc-pad-x vc-section-inner">
      <div>
        <span class="vc-rise2 vc-eyebrow vc-eyebrow--contact">
          <svg class="vc-icon-twinkle" width="14" height="14" viewBox="0 0 24 24" fill="#3FB0C4"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>
          <span data-text="Contact.Eyebrow"></span>
        </span>
        <h2 class="vc-rise2 vc-d1 vc-heading-lg vc-heading-lg--light" data-text="Contact.Heading"></h2>
        <p class="vc-rise2 vc-d2 vc-lead vc-lead--light" data-text="Contact.Lead"></p>
        <div class="vc-rise2 vc-d3 vc-contact-rows" id="ContactRows"></div>
      </div>

      <div class="vc-rise2 vc-d2 vc-form-panel">
        <div id="FormSuccess" class="vc-form-success" hidden>
          <div class="vc-form-success-icon">✓</div>
          <h3 class="vc-form-success-title" data-text="Contact.Form.SuccessTitle"></h3>
          <p class="vc-form-success-text" data-text="Contact.Form.SuccessMessage"></p>
          <button type="button" class="vc-form-reset" id="FormResetBtn" data-text="Contact.Form.ResetButton"></button>
        </div>
        <div id="FormPanel">
          <h3 class="vc-form-title" data-text="Contact.Form.Title"></h3>
          <p class="vc-form-subtitle" data-text="Contact.Form.Subtitle"></p>
          <form id="EnrollForm" class="vc-form-fields" novalidate>
            <label class="vc-field">
              <span class="vc-field-label" data-text="Contact.Form.NameLabel"></span>
              <input class="vc-field-input" id="FormName" name="name" data-placeholder="Contact.Form.NamePlaceholder" required>
            </label>
            <label class="vc-field">
              <span class="vc-field-label" data-text="Contact.Form.PhoneLabel"></span>
              <input class="vc-field-input" id="FormPhone" name="phone" data-placeholder="Contact.Form.PhonePlaceholder" required>
            </label>
            <div class="vc-form-row">
              <label class="vc-field">
                <span class="vc-field-label" data-text="Contact.Form.ClassLabel"></span>
                <select class="vc-field-input vc-field-input--select" id="FormGrade" name="grade">
                  <option value="" data-text="Contact.Form.ClassPlaceholder"></option>
                </select>
              </label>
              <label class="vc-field">
                <span class="vc-field-label" data-text="Contact.Form.BoardLabel"></span>
                <select class="vc-field-input vc-field-input--select" id="FormBoard" name="board">
                  <option value="" data-text="Contact.Form.ClassPlaceholder"></option>
                </select>
              </label>
            </div>
            <button type="submit" class="vc-link vc-btn-primary vc-form-submit" data-text="Contact.Form.SubmitButton"></button>
            <div class="vc-form-error" id="FormError" hidden data-text="Contact.Form.ErrorMessage"></div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="vc-footer">
    <div class="vc-footer-grid vc-pad-x">
      <div>
        <div class="vc-footer-brand">
          <span class="vc-logo-icon" data-text="Footer.BrandInitial"></span>
          <span class="vc-footer-logo-text" data-text="Footer.BrandName"></span>
        </div>
        <p class="vc-footer-desc" data-text="Footer.Description"></p>
      </div>
      <div>
        <div class="vc-footer-heading" data-text="Footer.ExploreHeading"></div>
        <div class="vc-footer-links" id="FooterLinks"></div>
      </div>
      <div>
        <div class="vc-footer-heading" data-text="Footer.VisitHeading"></div>
        <div class="vc-footer-visit">
          <span><span data-text="Footer.AddressLine1"></span><br><span data-text="Footer.AddressLine2"></span></span>
          <a href="#contact" class="vc-link vc-footer-enroll" data-text="Footer.EnrollLink"></a>
        </div>
      </div>
    </div>
    <div class="vc-footer-bar">
      <div class="vc-footer-bar-inner vc-pad-x">
        <span id="CopyrightText"></span>
        <span data-text="Footer.Tagline"></span>
      </div>
    </div>
  </footer>

</div>

<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
