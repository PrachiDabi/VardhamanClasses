document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n              <button onclick=\"{{ onSubmit }}\" class=\"vc-link\" style=\"margin-top:6px;background:#1D9E75;border:none;color:#fff;padding:16px;border-radius:999px;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 12px 26px rgba(29,158,117,0.3);\" style-hover=\"background:#188a66;transform:translateY(-2px);\">Enroll Now<\u002Fbutton>\n              <sc-if value=\"{{ showError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13.5px;color:#c0451a;font-weight:600;text-align:center;\">Please add your name and phone number.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#EAF3EF;color:#46584f;\">\n    <div class=\"vc-footer-grid vc-pad-x\" style=\"max-width:1180px;margin:0 auto;padding:56px 24px 40px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:11px;\">\n          <span style=\"width:34px;height:34px;border-radius:50%;background:#0D6B5E;color:#FAFAF7;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;\">V<\u002Fspan>\n          <span style=\"font-family:'Baloo 2',cursive;font-weight:700;font-size:21px;color:#0D6B5E;\">Vardhaman Classes<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.65;margin:16px 0 0;max-width:330px;\">A trusted coaching institute offering tuition for Classes 1 to 10 across CBSE, ICSE and SSC boards at Maharshi Nagar, near Gultekdi, Pune.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:#0D6B5E;\">Explore<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:14px;font-size:15px;\">\n          <a href=\"#about\" class=\"vc-link\" style=\"text-decoration:none;color: }\n    this.setState({ submitted: true, error: false });\n  }\n\n  reset() { this.setState({ submitted: false, form: { name: '', phone: '', grade: '', board: '' } }); }\n\n  componentDidMount() { this._setupReveal(); }\n\n  _setupReveal() {\n    const run = () => {\n      const els = [...document.querySelectorAll('.vc-fade,.vc-rise2')];\n      if (!els.length) return;\n      if (!('IntersectionObserver' in window)) { els.forEach(e => e.setAttribute('data-shown', '')); return; }\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach(en => { if (en.isIntersecting) { en.target.setAttribute('data-shown', ''); io.unobserve(en.target); } });\n      }, { rootMargin: '0px 0px -6% 0px', threshold: 0.06 });\n      els.forEach(e => {\n        const r = e.getBoundingClientRect();\n        if (r.top < window.innerHeight * 0.94) e.setAttribute('data-shown', '');\n        else io.observe(e);\n      });\n      // failsafe: nothing stays hidden\n      setTimeout(() => els.forEach(e => e.setAttribute('data-shown', '')), 2800);\n    };\n    requestAnimationFrame(() => requestAnimationFrame(run));\n  }\n\n  _ic(nodes, o) {\n    o = o || {};\n    const R = React;\n    return R.createElement('svg', {\n      width: o.s || 27, height: o.s || 27, viewBox: '0 0 24 24', fill: 'none',\n      stroke: o.st || '#0D6B5E', strokeWidth: o.w || 2, strokeLinecap: 'round', strokeLinejoin: 'round'\n    }, nodes.map((n, i) => {\n      if (typeof n === 'string') return R.createElement('path', { key: i, d: n });\n      if (n[0] === 'c') return R.createElement('circle', { key: i, cx: n[1], cy: n[2], r: n[3] });\n      if (n[0] === 'l') return R.createElement('line', { key: i, x1: n[1], y1: n[2], x2: n[3], y2: n[4] });\n      if (n[0] === 'r') return R.createElement('rect', { key: i, x: n[1], y: n[2], width: n[3], height: n[4], rx: n[5] || 0 });\n      return null;\n    }));\n  }\n\n  renderVals() {\n    const ic = (n, o) => this._ic(n, o);\n    const P = { st: '#0D6B5E', s: 27 };\n    const M = { st: '#5DCAA5', s: 22 };\n    const S = { st: '#0D6B5E', s: 16, w: 2 };\n\n    const I = {\n      boards: ['M3 11l9-7 9 7', 'M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9'],\n      cap: ['M22 9 12 5 2 9l10 4 10-4Z', 'M6 11v5c0 1 2.7 2 6 2s6-1 6-2v-5', 'M22 9v5'],\n      users: ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2', 'M22 21v-2a4 4 0 0 0-3-3.87', 'M16 3.13a4 4 0 0 1 0 7.75', ['c', 9, 7, 4]],\n      clip: ['M9 4H7a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2', ['r', 9, 2, 6, 4, 1], 'M9 13l2 2 4-4'],\n      chat: ['M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z', 'M9.5 8.5a2.5 2.5 0 1 1 3 2.4c-.6.3-1 .9-1 1.6', ['c', 11.4, 15.5, 0.35]],\n      pin: ['M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z', ['c', 12, 10, 3]],\n      sun: [['c', 12, 12, 4], 'M12 2v2', 'M12 20v2', 'M4 12H2', 'M22 12h-2', 'M5.6 5.6 7 7', 'M17 17l1.4 1.4', 'M18.4 5.6 17 7', 'M7 17l-1.4 1.4'],\n      book: ['M2 4h6a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H2Z', 'M22 4h-6a3 3 0 0 0-3 3v13a2 2 0 0 1 2-2h7Z'],\n      trophy: ['M6 9H4.5a2.5 2.5 0 0 1 0-5H6', 'M18 9h1.5a2.5 2.5 0 0 0 0-5H18', 'M4 22h16', 'M10 14.6V17c0 .5-.4 1-1 1.2C7.8 18.7 7 20.2 7 22', 'M14 14.6V17c0 .5.4 1 1 1.2 1.2.5 2 2 2 3.8', 'M18 2H6v7a6 6 0 0 0 12 0Z'],\n      flask: ['M9 3h6', 'M10 3v6l-5 8.5A2 2 0 0 0 6.7 21h10.6a2 2 0 0 0 1.7-3.5L14 9V3', 'M8.5 14h7'],\n      globe: [['c', 12, 12, 9], 'M3 12h18', 'M12 3a15 15 0 0 1 0 18', 'M12 3a15 15 0 0 0 0 18'],\n      calc: [['r', 5, 3, 14, 18, 3], 'M9 7h6', ['c', 9, 12, 0.4], ['c', 12, 12, 0.4], ['c', 15, 12, 0.4], ['c', 9, 16, 0.4], ['c', 12, 16, 0.4], ['c', 15, 16, 0.4]],\n      bookS: ['M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2Z', 'M8 7h7', 'M8 11h5'],\n      chatS: ['M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z'],\n      phone: ['M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8.1 9.9a16 16 0 0 0 6 6l1.5-1.2a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2Z'],\n      mail: [['r', 2, 4, 20, 16, 2], 'M22 7 12 13 2 7'],\n      clock: [['c', 12, 12, 9], 'M12 7v5l3 2']\n    };\n\n    return {\n      subjects: [\n        { label: 'Maths', iconEl: ic(I.calc, S) },\n        { label: 'Science', iconEl: ic(I.flask, S) },\n        { label: 'English', iconEl: ic(I.bookS, S) },\n        { label: 'Hindi & Marathi', iconEl: ic(I.chatS, S) },\n        { label: 'Social Studies', iconEl: ic(I.globe, S) }\n      ],\n\n      trustItems: ['Experienced subject experts', 'All boards covered', 'Small batch sizes', 'Regular tests & doubt sessions'],\n\n      aboutStats: [\n        { big: '3 Boards', small: 'CBSE · ICSE · SSC', iconEl: ic(I.boards, P) },\n        { big: 'Classes 1–10', small: 'Every grade', iconEl: ic(I.cap, P) },\n        { big: 'Small batches', small: 'Real attention', iconEl: ic(I.users, P) }\n      ],\n\n      teachers: [\n        { name: 'Shweta Jain', role: 'Science and Mathematics', photo: 'Shweta Jain — photo', subjects: 'Mathematics, Science (Physics, Chemistry, Biology)', bio: 'Shweta Jain brings a concept-first approach to Science and Mathematics that transforms how students think and solve problems. Known for her patience and ability to simplify complex topics, she ensures every student builds a strong academic foundation. Her students consistently report improved problem-solving skills and significantly better exam results.', iconEl: ic(I.flask, { st: '#0D6B5E', s: 24 }) },\n        { name: 'Vandana Mutha', role: 'Social Studies and Languages', photo: 'Vandana Mutha — photo', subjects: 'Social Studies (History, Geography, Civics), Languages (English, Hindi, Marathi)', bio: 'Vandana Mutha makes Social Studies and Languages engaging through real-world connections, structured discussions and a storytelling approach that helps students retain what they learn. Under her guidance, students develop not just subject knowledge but strong reading, writing and communication skills that stay with them for life.', iconEl: ic(I.globe, { st: '#0D6B5E', s: 24 }) }\n      ],\n\n      reasons: [\n        { n: '1', title: 'All Three Boards Under One Roof', body: 'Whether your child is in CBSE, ICSE or SSC, Vardhaman Classes covers it all with equal depth and expertise.', iconEl: ic(I.boards, P) },\n        { n: '2', title: 'Dedicated Subject Experts', body: 'Our teachers are specialists in their subjects, not generalists. This means deeper understanding and better results for every student.', iconEl: ic(I.cap, P) },\n        { n: '3', title: 'Small Batch Sizes', body: 'We keep our batches intentionally small so every student receives personal attention and no doubt goes unaddressed.', iconEl: ic(I.users, P) },\n        { n: '4', title: 'Regular Tests and Assessments', body: 'Students are assessed consistently through chapter tests, unit tests and full mock exams so they are always exam-ready.', iconEl: ic(I.clip, P) },\n        { n: '5', title: 'Daily Doubt Sessions', body: 'Every student has access to dedicated doubt-clearing sessions so learning never gets stuck.', iconEl: ic(I.chat, P) },\n        { n: '6', title: 'Conveniently Located', body: 'Our institute is easily accessible at Maharshi Nagar, near Gultekdi, Pune.', iconEl: ic(I.pin, P) }\n      ],\n\n      batches: [\n        { range: 'CLASSES 1 TO 5', title: 'Primary Batches', body: 'We build strong academic foundations in Mathematics, Languages, Environmental Science and General Knowledge. Learning at this stage is made interactive, age-appropriate and enjoyable so students develop a positive relationship with education from the very beginning.', bg: '#FAFAF7', head: '#0D6B5E', text: '#46584f', link: '#1D9E75', iconEl: ic(I.sun, P) },\n        { range: 'CLASSES 6 TO 8', title: 'Middle School Batches', body: 'Concepts deepen at this stage and so does our approach. Our structured program covers all subjects across CBSE, ICSE and SSC with special attention given to Mathematics and Science where students often begin to struggle.', bg: '#FAFAF7', head: '#0D6B5E', text: '#46584f', link: '#1D9E75', iconEl: ic(I.book, P) },\n        { range: 'CLASSES 9 AND 10', title: 'Board Exam Batches', body: 'Board exam preparation done right. We offer focused chapter-wise revision, regular full-length mock tests, performance tracking and intensive one-on-one doubt sessions. Our goal is simple: every student walks into their board exam with complete preparation and full confidence.', bg: '#0D6B5E', head: '#FAFAF7', text: 'rgba(250,250,247,0.82)', link: '#5DCAA5', iconEl: ic(I.trophy, P) }\n      ],\n\n      testimonials: [\n        { text: \"Shweta Ma'am's way of teaching Maths completely changed how my son approaches the subject. He went from struggling to scoring 92 in his SSC boards.\", author: 'Parent of a Class 10 student', board: 'SSC Board' },\n        { text: \"Vandana Ma'am makes History feel like a story. My daughter actually looks forward to Social Studies now, which I never thought I'd say.\", author: 'Parent of a Class 8 student', board: 'CBSE Board' },\n        { text: 'The small batch size made all the difference. The teachers genuinely know where each child is and what they need.', author: 'Parent of a Class 6 student', board: 'ICSE Board' }\n      ],\n\n      contactRows: [\n        { label: 'ADDRESS', value: 'Maharshi Nagar, Near Gultekdi, Pune', iconEl: ic(I.pin, M) },\n        { label: 'PHONE', value: 'Add your number', iconEl: ic(I.phone, M) },\n        { label: 'EMAIL', value: 'Add your email', iconEl: ic(I.mail, M) },\n        { label: 'BATCH TIMINGS', value: 'Add your schedule', iconEl: ic(I.clock, M) }\n      ],\n\n      grades: ['Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7','Class 8','Class 9','Class 10'],\n\n      form: this.state.form,\n      onName: this.upd('name'),\n      onPhone: this.upd('phone'),\n      onGrade: this.upd('grade'),\n      onBoard: this.upd('board'),\n      onSubmit: () => this.submit(),\n      resetForm: () => this.reset(),\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      showError: this.state.error,\n      year: new Date().getFullYear()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
